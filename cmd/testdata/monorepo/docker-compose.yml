services:
  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      target: installer
    command: sh -c "npm install && npm run dev --workspace=admin"
    ports:
      - "3003:3003"
    env_file:
      - apps/admin/.env
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - /app/apps/admin/node_modules

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: builder
    command: sh -c "npm install && npm run start:dev --workspace=api"
    ports:
      - "3000:3000"
    env_file:
      - apps/api/.env
    environment:
      DB_HOST: postgres
      NODE_ENV: development
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/package.json:/app/apps/api/package.json
      - ./apps/api/uploads:/app/apps/api/uploads
      - ./node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  aService:
    build:
      context: .
      dockerfile: docker/Dockerfile.aService
      target: builder
    command: sh -c "npm install && npm run dev --workspace=aService"
    ports:
      - "2024:2024"
    env_file:
      - apps/aService/.env
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/aService/src:/app/apps/aService/src
      - ./apps/aService/package.json:/app/apps/aService/package.json
      - ./apps/aService/.env:/app/apps/aService/.env

  anotherService:
    build:
      context: .
      dockerfile: docker/Dockerfile.anotherService
      target: builder
    command: sh -c "npm install && npm run start:dev --workspace=anotherService"
    ports:
      - "3004:3004"
    env_file:
      - apps/anotherService/.env
    environment:
      GCS_SERVICE_ACCOUNT_JSON: ${GCS_SERVICE_ACCOUNT_JSON:-}
      NODE_ENV: development
      PDF_DPI: ${PDF_DPI:-150}
      PDF_MAX_DIMENSION: ${PDF_MAX_DIMENSION:-1568}
    volumes:
      - ./apps/anotherService/src:/app/apps/anotherService/src
      - ./apps/anotherService/package.json:/app/apps/anotherService/package.json

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: installer
    command: sh -c "npm install && npm run dev --workspace=web"
    ports:
      - "3001:3001"
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: development
      API_URL: http://api:3000
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-somedb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-somedb}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
