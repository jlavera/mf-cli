services:
  web:
    build: .
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pythonapp
      POSTGRES_USER: pythonuser
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
