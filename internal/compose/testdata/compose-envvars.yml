services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: builder
    command: sh -c "npm install && npm run start:dev --workspace=api"
    ports:
      - "3000:3000"
    env_file:
      - apps/api/.env
    environment:
      DB_HOST: postgres
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: installer
    command: sh -c "npm install && npm run dev --workspace=web"
    ports:
      - "3001:3001"
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: development
      API_URL: http://api:3000

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      target: installer
    command: sh -c "npm install && npm run dev --workspace=admin"
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      API_URL: http://api:3000
      VITE_WEB_URL: ${VITE_WEB_URL:-}

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-thirdst}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-thirdst}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
