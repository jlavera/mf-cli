# mf.yaml — Configuration for the mf CLI tool
# Generated by: mf init
# Docs: https://github.com/jlavera/mf-cli

# Project name (used for display purposes)
project: my-project

# Docker Compose file to use (default: docker-compose.yml)
compose_file: docker-compose.yml

# Services detected from docker-compose, each with a type.
# The type determines how mf interacts with the service:
#   App types (python, nodejs, ruby, java, go) → mf shell, mf test, mf format, mf lint
#   DB types (postgres, mysql, mongo)          → mf psql
#   redis                                      → mf redis-cli
#   celery_worker, celery_beat                 → mf celery start/stop/restart/logs
#   flower                                     → mf flower logs
#   Services with path: set                    → mf run <service> <script>
services:
  - name: web
    type: python
  - name: db
    type: postgres
    db_name: mydb
    db_user: postgres
  - name: redis
    type: redis
  - name: celery_worker
    type: celery_worker
  - name: celery_flower
    type: flower
  - name: frontend
    type: nodejs
    path: ./frontend
    package_manager: npm

# End-to-end testing settings
e2e:
  path: ./e2e               # Relative path to e2e test directory
  framework: playwright     # playwright | cypress
  browser: chromium         # Browser to install/use

# Project scripts (paths relative to project root)
scripts:
  pre_commit: ./scripts/pre-commit-docker.sh
  pre_commit_local: ./scripts/pre-commit-local-docker.sh
  format: ./scripts/docker-black.sh
  lint: ./scripts/docker-pylint.sh
  ruff: ./scripts/docker-ruff.sh

# Test runner configuration
test:
  runner: pytest            # Test runner command
  env:                      # Environment variables passed during tests
    ENV: test
  debug_port: 5679          # Port for debugpy attachment
